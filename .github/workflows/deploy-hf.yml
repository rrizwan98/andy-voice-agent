name: Deploy Backend to HuggingFace Spaces

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-hf.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "andy@ai-employee.com"
          git config --global user.name "Andy AI"

          # Clone HF Space
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/rrizwan98/openai_first_voice_agent /tmp/hf-space

          # Sync backend folder into HF Space root (overwrite)
          rsync -av --delete \
            --exclude='.git' \
            backend/ /tmp/hf-space/

          # Commit and push
          cd /tmp/hf-space
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "sync: backend from github@${{ github.sha }}"
          git push https://user:${HF_TOKEN}@huggingface.co/spaces/rrizwan98/openai_first_voice_agent main
