name: Deploy Backend to HuggingFace Spaces

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-hf.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push backend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "andy@ai-employee.com"
          git config --global user.name "Andy AI"

          mkdir /tmp/hf-space
          cp -r backend/. /tmp/hf-space/

          cd /tmp/hf-space
          git init
          git checkout -b main
          git add -A
          git commit -m "sync: backend from github@${{ github.sha }}"

          git push --force https://user:${HF_TOKEN}@huggingface.co/spaces/rrizwan98/test_voice_agent main
